name: Build Font

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  DOCKER_PLATFORM: linux/amd64

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: |
          docker build --platform "${DOCKER_PLATFORM}" -t ha-gothick-build-ci .

      - name: Build fonts
        run: |
          docker run --rm \
            --platform "${DOCKER_PLATFORM}" \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp/ha-gothick-home \
            -e UV_CACHE_DIR=/work/.uv-cache \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            ha-gothick-build-ci \
            bash ./setup_build_env.sh

          docker run --rm \
            --platform "${DOCKER_PLATFORM}" \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp/ha-gothick-home \
            -e UV_CACHE_DIR=/work/.uv-cache \
            -e HA_GOTHICK_BUILD_IN_CONTAINER=1 \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            ha-gothick-build-ci \
            bash ./build.sh

      - name: Validate fonts
        run: |
          docker run --rm \
            --platform "${DOCKER_PLATFORM}" \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp/ha-gothick-home \
            -e UV_CACHE_DIR=/work/.uv-cache \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            ha-gothick-build-ci \
            bash ./validate.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: ${{ !env.ACT }}
        with:
          name: ha-gothick-dist
          path: |
            dist/*.ttf
            dist/LICENSE.txt
            dist/README.md
            build/ttx/*

      - uses: softprops/action-gh-release@v2
        if: ${{ !env.ACT && startsWith(github.ref, 'refs/tags/') }}
        with:
          files: |
            dist/*.ttf
            dist/LICENSE.txt
            dist/README.md
