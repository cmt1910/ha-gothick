name: Build Font

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fontforge python3-fontforge ttfautohint unzip xz-utils

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        if: ${{ !env.ACT }}
        with:
          python-version: "3.12"

      - name: Setup build environment
        run: bash setup_build_env.sh

      - name: Build fonts
        run: bash build.sh

      - name: Validate fonts
        run: bash validate.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: ${{ !env.ACT }}
        with:
          name: ha-gothick-dist
          path: |
            dist/*.ttf
            dist/LICENSE.txt
            dist/README.md
            build/ttx/*

      - uses: softprops/action-gh-release@v2
        if: ${{ !env.ACT && startsWith(github.ref, 'refs/tags/') }}
        with:
          files: |
            dist/*.ttf
            dist/LICENSE.txt
            dist/README.md
